InputFilepaths:
  skiFilepath: "/mnt/aridata1/users/ariadurr/WORK/Processing/colibre-skirt/template_v{skifileversion}.ski" # The path to the ski file
  simPath: "/mnt/aridata1/users/ariadurr/WORK/Simulations/{simName}" # Path to COLIBRE simulation
  catalogueFile: "{simPath}/SOAP/halo_properties_{snap_nr:04d}.hdf5"

  # If the snapshots are distributed
  virtualSnapshotFile: "{simPath}/SOAP/colibre_with_SOAP_membership_{snap_nr:04d}.hdf5"

  # If not distributed you need to provide the membership and snapshot information separately
  snapshotFile: "{simPath}/snapshots/colibre_{snap_nr:04d}.hdf5"
  membershipFile: "{simPath}/SOAP/membership_{snap_nr:04d}.hdf5"

OutputFilepaths:
  sampleFolder: "{simPath}/SKIRT/SampleFiles/" # Folder where the galaxy sample .txt files will be stored
  storeParticlesPath: "{simPath}/SKIRT/SampleFiles/" # Folder where the COLIBRE particle .txt files will be stored
  SKIRTinputFilePath: "{simPath}/SKIRT/InputFiles/" # Path where the SKIRT input files will be stored
  SKIRToutputFilePath: "{simPath}/SKIRT/OutputFiles/FSPSChabrier100_Npp_100_face_on/" # Path where the SKIRT output files will be stored

SelectionCriteria:
  minStellarMass: 5.0e10 # Lower stellar mass limit for halo selection in Msun
  maxStellarMass: 8.0e10 # Upper stellar mass limit for halo selection in Msun
  maxNumHalos: 4 # Max number of halos to select in the given mass range

ModelParameters:
  SKIRTboxsize: 100 # in kpc
  starsMaxAge: 10 # in Myr, stars younger than this age are modelled from SF gas. This must match TODDLERS SFR period.
  photonPackets: 100 # Number of photon packets per gas particle
  binTreeMaxLevel: 36 # Max refinement level of the spatial grid
  rotation: "face_on" # Option to rotate galaxy based on the angular momentum vector of stars